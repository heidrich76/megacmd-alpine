name: Build Archives for MEGAcmd on Alpine

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version (optional)"
        required: false

permissions:
  contents: write

env:
  PREFIX: megacmd_alpine_${{ github.event.inputs.version || github.ref_name }}

jobs:
  build:
    name: Build ${{ matrix.arch }} archive
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
            image_tag: arm64
          - arch: x86_64
            runner: ubuntu-24.04
            platform: linux/amd64
            image_tag: amd64

    steps:
      - uses: actions/checkout@v6

      - name: Load build.env
        shell: bash
        run: |
          set -a
          source build.env
          set +a
          echo "VERSION=$MEGA_VERSION" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image and extract artifact
        shell: bash
        run: |
          docker build \
            --platform "${{ matrix.platform }}" \
            --target final \
            -t "local/megacmd:${{ matrix.image_tag }}" .

          container_id=$(docker create "local/megacmd:${{ matrix.image_tag }}")
          docker cp "$container_id:/packages/megacmd-${VERSION}-r0.tar.gz" "./${PREFIX}_${{ matrix.arch }}.tar.gz"
          docker cp "$container_id:/packages/megacmd-${VERSION}-r0.apk" "./${PREFIX}_${{ matrix.arch }}.apk"
          docker rm "$container_id"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PREFIX }}_${{ matrix.arch }}
          path: |
            ${{ env.PREFIX }}_${{ matrix.arch }}.tar.gz
            ${{ env.PREFIX }}_${{ matrix.arch }}.apk

  release:
    name: Create GitHub Release
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: ./artifacts

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          files: |
            artifacts/${{ env.PREFIX }}_aarch64/${{ env.PREFIX }}_aarch64.tar.gz
            artifacts/${{ env.PREFIX }}_aarch64/${{ env.PREFIX }}_aarch64.apk
            artifacts/${{ env.PREFIX }}_x86_64/${{ env.PREFIX }}_x86_64.tar.gz
            artifacts/${{ env.PREFIX }}_x86_64/${{ env.PREFIX }}_x86_64.apk
